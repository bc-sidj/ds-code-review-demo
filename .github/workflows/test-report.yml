name: AI Test Report

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-report:
    name: Generate & Run AI Test Cases
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@test'))

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai pytest snowflake-connector-python

      - name: Generate diff
        run: git diff origin/main...HEAD > /tmp/diff.txt

      - name: Generate test report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASE_URL: "https://api.openai.com/v1"
          REVIEW_MODEL: "gpt-4o"
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: python .github/scripts/generate_test_report.py > /tmp/test_report.md

      - name: Post test report on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: gh pr comment "$PR_NUMBER" --body-file /tmp/test_report.md

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-PR-${{ github.event.pull_request.number || github.event.issue.number }}
          path: /tmp/test_report.md
          retention-days: 90

      - name: Add status label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          if grep -q "ALL CHECKS PASSED" /tmp/test_report.md; then
            gh pr edit "$PR_NUMBER" --add-label "tests-passed" --remove-label "tests-failed" 2>/dev/null || true
          else
            gh pr edit "$PR_NUMBER" --add-label "tests-failed" --remove-label "tests-passed" 2>/dev/null || true
          fi
