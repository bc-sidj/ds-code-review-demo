name: Claude Automated Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  # Also respond to @claude mentions in PR comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    name: Claude First-Pass Code Review
    runs-on: ubuntu-latest
    # Run on PR events, or when someone tags @claude in a comment
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # The review prompt — tells Claude to write review to a file
          prompt: |
            You are reviewing a Pull Request for the BigCommerce Data Solutions (DS) team's dw_airflow repository. This repo contains Airflow DAGs (Python) and Snowflake DDL/DML (SQL).

            IMPORTANT INSTRUCTIONS:
            1. Perform the full code review below
            2. Write your COMPLETE review to the file: /home/runner/work/_temp/claude-review.md
            3. Use the Bash tool to write the file: bash -c 'cat > /home/runner/work/_temp/claude-review.md << "REVIEWEOF"\n[your review here]\nREVIEWEOF'
            4. Do NOT attempt to post via gh CLI or GitHub API — a separate step will post the file as a PR comment

            Perform a thorough first-pass code review. Read every changed file in this PR using git diff, then write a single GitHub-flavored Markdown review structured as follows:

            ## Claude Automated Code Review

            ### DS Workflow Compliance
            | Check | Status | Notes |
            |-------|--------|-------|
            | Jira ticket in commit message (DS-XXXX or ANALYTICS-XXXX) | PASS/FAIL | Which ticket found, or "None found" |
            | Testing doc reminder | PASS/REMINDER | "Airflow code changed — ensure testing is done" or "No Airflow changes" |
            | Rollout doc reminder | PASS/REMINDER | "DDL/DML detected — rollout doc needed" or "No DDL/DML" |
            | DDL-only simplified process | INFO/N/A | "Only SQL files changed — simplified PR process may apply" |

            ### Code Review Findings
            For EACH changed file, create a section with:

            **For Python / Airflow files (.py):**
            - catchup explicitly set (prefer False unless backfill intended)
            - default_args has owner, start_date, retries, retry_delay
            - Task deps correct (>> chaining, no orphaned tasks, no circular deps)
            - Correct operator for task type
            - retries and on_failure_callback present
            - Idempotent (safe to re-run)
            - No hardcoded credentials or environment-specific paths (use Airflow Variables/Connections)
            - No unused/missing imports
            - snake_case naming for DAG/task IDs
            - Edge cases: empty datasets, NULL in key fields, date/timezone issues, large volume

            **For SQL files (.sql):**
            - All object refs fully qualified (schema.object, e.g., FIL.STORE not just STORE)
            - No USE SCHEMA statements
            - Object COMMENT includes ticket: COMMENT = 'DS-XXXX ...'
            - All UPDATE/DELETE have WHERE clause (CRITICAL if missing)
            - NULLability intentional
            - No unnecessary SELECT *
            - sp_rollout start/end calls present if rollout doc
            - Edge cases: NULL propagation in JOINs, duplicates, divide-by-zero, empty result sets

            Use severity levels:
            - CRITICAL — must fix before merge (security, missing WHERE on DML, broken logic)
            - WARNING — should address (missing error handling, unhandled edge cases)
            - SUGGESTION — nice to have (readability, performance)
            - PASS — explicitly call out things done well

            ### Edge Cases Summary
            List all detected edge cases with file and line references.

            ### Generated Test Cases

            **Python (pytest stubs):**
            For each changed .py file, generate test stubs covering: happy path, empty input, NULL values, date boundaries, upstream task failure.

            **SQL (validation queries):**
            For each changed .sql file, generate: row count check, NULL check on key columns, duplicate check, range/sanity check, sample spot-check.

            ### Summary
            | Metric | Count |
            |--------|-------|
            | Critical issues | X |
            | Warnings | X |
            | Suggestions | X |
            | Checks passed | X |

            **Verdict:** READY FOR HUMAN REVIEW / ADDRESS WARNINGS / CRITICAL ISSUES FOUND

            > This is an automated first-pass review by Claude. A human reviewer must still approve this PR. Separation of duties applies for production rollout per DS SOX compliance requirements.

          claude_args: "--max-turns 15 --model claude-sonnet-4-5-20250929"
          show_full_output: true

      - name: Post Review as PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = '/home/runner/work/_temp/claude-review.md';

            if (!fs.existsSync(reviewPath)) {
              console.log('No review file found at', reviewPath);
              return;
            }

            const review = fs.readFileSync(reviewPath, 'utf8').trim();
            if (!review) {
              console.log('Review file is empty');
              return;
            }

            const prNumber = context.payload.pull_request?.number ?? context.payload.issue?.number;
            if (!prNumber) {
              console.log('Could not determine PR number');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: review
            });

            console.log(`Posted review comment to PR #${prNumber}`);
